name: CI

# Runs the deterministic verification suite and a production build on every
# push to main and every pull request. ShipDay's thesis is that shipping
# safely means having evidence; this workflow makes the repository practice
# that by gating every change on the same checks the build prompts required.

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-flight run when a newer commit lands on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-build:
    name: Verify and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run the verification suite
        run: npm run verify

      - name: Theme guardrail (no pure white, contrast targets)
        run: npm run check:theme

      - name: Production build
        run: npm run build
